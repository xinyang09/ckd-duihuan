<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDK 兑换中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-deep: #06091a;
        --bg: #0b0f23;
        --panel: rgba(255, 255, 255, 0.04);
        --panel-strong: rgba(255, 255, 255, 0.07);
        --panel-hover: rgba(255, 255, 255, 0.10);
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.16);
        --text: #f0f4ff;
        --muted: #64748b;
        --muted-2: #94a3b8;
        --accent: #6366f1;
        --accent-2: #8b5cf6;
        --accent-glow: rgba(99, 102, 241, 0.28);
        --cyan: #06b6d4;
        --cyan-2: #0284c7;
        --cyan-glow: rgba(6, 182, 212, 0.28);
        --success: #10b981;
        --error: #f87171;
        --shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', 'PingFang SC', 'Noto Sans SC', sans-serif;
        background:
          radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.14) 0, transparent 60%),
          radial-gradient(ellipse 60% 50% at 80% 90%, rgba(139,92,246,0.10) 0, transparent 60%),
          linear-gradient(160deg, #06091a 0%, #0b0f23 50%, #080c1e 100%);
        color: var(--text);
        min-height: 100vh;
        padding: 28px 16px 48px;
      }
      .page {
        width: min(520px, 100%);
        margin: 0 auto;
      }

      /* ── Hero ── */
      .hero {
        margin-bottom: 20px;
        text-align: center;
      }
      .hero h1 {
        font-size: 38px;
        line-height: 1;
        letter-spacing: -0.04em;
        font-weight: 800;
        background: linear-gradient(135deg, #f0f4ff 0%, #a5b4fc 60%, #8b5cf6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero p {
        margin-top: 8px;
        color: var(--muted-2);
        font-size: 15px;
      }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .tab-btn {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 22px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: var(--panel);
        color: var(--muted-2);
        font-family: inherit;
        transition: all 0.2s ease;
        backdrop-filter: blur(12px);
      }
      .tab-btn:hover {
        border-color: var(--line-strong);
        color: var(--text);
        background: var(--panel-strong);
      }
      .tab-btn.active {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        border-color: transparent;
        box-shadow: 0 8px 28px var(--accent-glow);
      }
      .tab-btn[data-tab="sms"].active {
        background: linear-gradient(135deg, var(--cyan), var(--cyan-2));
        box-shadow: 0 8px 28px var(--cyan-glow);
      }

      /* ── Card ── */
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 20px;
        box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.06);
        backdrop-filter: blur(24px);
        max-width: 100%;
      }
      .tab-panel[hidden] { display: none; }
      #plusResultPanels[hidden],
      #accountPhoneCard[hidden] { display: none !important; }

      h2 {
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: -0.02em;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .muted {
        color: var(--muted-2);
        font-size: 14px;
        line-height: 1.65;
      }

      /* ── Input row ── */
      .row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        margin: 20px 0 14px;
      }
      input, textarea {
        width: 100%;
        padding: 14px 18px;
        border-radius: 14px;
        border: 1px solid var(--line);
        font-size: 15px;
        font-family: inherit;
        background: rgba(255,255,255,0.05);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }
      input::placeholder, textarea::placeholder {
        color: var(--muted);
      }
      input:focus, textarea:focus {
        border-color: var(--accent);
        background: rgba(99,102,241,0.06);
        box-shadow: 0 0 0 4px var(--accent-glow);
      }

      /* ── Buttons ── */
      button {
        border: 0;
        border-radius: 14px;
        padding: 0 22px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        color: white;
        font-family: inherit;
        height: 50px;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        white-space: nowrap;
      }
      button:hover { transform: translateY(-2px); }
      button:active { transform: translateY(0); }
      .primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 8px 24px var(--accent-glow);
      }
      .primary:hover { box-shadow: 0 14px 36px var(--accent-glow); }
      .secondary {
        background: linear-gradient(135deg, #374151, #1f2937);
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      }
      .tertiary {
        background: linear-gradient(135deg, var(--cyan), var(--cyan-2));
        box-shadow: 0 8px 24px var(--cyan-glow);
      }
      .tertiary:hover { box-shadow: 0 14px 36px var(--cyan-glow); }

      /* ── Status ── */
      .status {
        min-height: 22px;
        margin-bottom: 12px;
        font-size: 13px;
        font-weight: 500;
        border-radius: 8px;
        padding: 0 2px;
      }

      /* ── Info panels ── */
      .panel-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-bottom: 10px;
      }
      .panel {
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel-strong);
        transition: all 0.2s ease;
      }
      .copy-panel {
        cursor: pointer;
      }
      .copy-panel:hover {
        border-color: var(--line-strong);
        background: var(--panel-hover);
        transform: translateY(-1px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.3);
      }
      .copy-panel.copied {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-glow);
      }
      .label {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 6px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }
      .label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 6px;
      }
      .copy-tip {
        font-size: 11px;
        color: var(--accent);
        opacity: 0.8;
        font-weight: 500;
      }
      .value {
        font-size: 17px;
        font-weight: 600;
        word-break: break-all;
        color: var(--text);
      }

      /* ── Mail section ── */
      .mail, .sms-box {
        padding: 18px;
        border-radius: 18px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
      }
      .mail-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }
      .mail-head-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .mail-status {
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        white-space: nowrap;
      }
      #codeBtn {
        height: 32px;
        padding: 0 14px;
        font-size: 12px;
        font-weight: 600;
        border-radius: 999px;
        background: rgba(99,102,241,0.12);
        border: 1px solid rgba(99,102,241,0.35);
        color: #a5b4fc;
        box-shadow: none;
        transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      #codeBtn::before {
        content: "↻";
        font-size: 13px;
        line-height: 1;
      }
      #codeBtn:hover {
        background: rgba(99,102,241,0.22);
        border-color: rgba(99,102,241,0.6);
        color: #c7d2fe;
        transform: translateY(-1px);
      }
      #codeBtn:active {
        transform: translateY(0);
      }
      .mail-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .mail-tip {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        background: rgba(250,204,21,0.06);
        border: 1px solid rgba(250,204,21,0.18);
        font-size: 12px;
        line-height: 1.6;
        color: #fde68a;
      }
      .mail-tip-icon {
        font-size: 14px;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .mail-item {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255,255,255,0.03);
        padding: 14px 16px;
        transition: border-color 0.2s ease, background 0.2s ease;
      }
      .mail-item:hover {
        border-color: var(--line-strong);
        background: rgba(255,255,255,0.06);
      }
      .mail-item-title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.4;
        margin-bottom: 4px;
        color: var(--text);
      }
      .mail-item-meta {
        font-size: 12px;
        color: var(--muted-2);
        line-height: 1.5;
      }
      .mail-empty {
        padding: 8px 2px 2px;
        font-size: 14px;
        color: var(--muted-2);
        line-height: 1.5;
      }
      .mail-item-code {
        margin-top: 10px;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.05em;
        color: #f8fafc;
        text-shadow: 0 0 18px rgba(129, 140, 248, 0.18);
      }
      .code-copyable {
        cursor: pointer;
        position: relative;
        transition: opacity 0.15s ease;
        color: #facc15;
      }
      .code-copyable:hover {
        opacity: 1;
        color: #fde047;
      }
      .code-copy-hint {
        display: inline-block;
        margin-left: 8px;
        font-size: 12px;
        font-weight: 500;
        color: #cbd5e1;
        background: none;
        -webkit-text-fill-color: #cbd5e1;
        letter-spacing: 0;
        vertical-align: middle;
        opacity: 0.9;
        transition: opacity 0.2s ease;
      }
      .code-copyable:hover .code-copy-hint { opacity: 1; }
      .code-copy-hint.copied {
        color: var(--success);
        -webkit-text-fill-color: var(--success);
        opacity: 1;
      }

      /* ── SMS ── */
      .sms-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin: 16px 0 14px;
      }
      .mono {
        font-family: ui-monospace, 'SFMono-Regular', Menlo, monospace;
      }
      .link {
        color: var(--cyan);
        word-break: break-all;
        text-decoration: none;
      }
      .link:hover { text-decoration: underline; }

      /* ── Responsive ── */
      @media (max-width: 640px) {
        .row, .sms-actions, .panel-grid { grid-template-columns: 1fr; }
        button { height: 46px; }
        .hero h1 { font-size: 38px; }
        body { padding: 32px 12px 48px; }
        .card { padding: 20px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>CDK兑换</h1>
      </section>

      <section class="tabs">
        <button class="tab-btn active" data-tab="mail" type="button">Plus成品号</button>
        <button class="tab-btn" data-tab="sms" type="button">Codex接码</button>
      </section>

      <section id="panel-mail" class="tab-panel card">
        <h2>Plus兑换</h2>
        <p class="muted">输入 GPT 开头的邮箱账号 CDK，获取账号信息和最近验证码邮件。</p>

        <div class="row">
          <input id="cdk" placeholder="请输入 GPT CDK" />
          <button class="primary" id="lookupBtn">兑换</button>
        </div>

        <div class="status" id="status" hidden></div>

        <section class="panel-grid" id="plusResultPanels" style="margin-top: 16px;" hidden>
          <div class="panel">
            <div class="label-row">
              <div class="label">邮箱</div>
              <div class="copy-tip">点击复制</div>
            </div>
            <div class="value copy-panel" id="emailPanel" data-copy-target="email" data-copy-label="邮箱" title="点击复制邮箱">
              <span id="email">-</span>
            </div>
            <div class="mail-head" style="margin-top: 18px;">
              <div class="label" style="margin-bottom: 0;">邮箱验证码</div>
              <div class="mail-head-actions">
                <div class="mail-status" id="mailStatus">自动刷新倒计时 15 秒</div>
                <button id="codeBtn" type="button">立即获取</button>
              </div>
            </div>
            <div id="mailList" class="mail-list">
              <div class="mail-empty">暂无验证码</div>
            </div>
          </div>

          <div class="panel" id="accountPhoneCard" hidden>
            <div class="label-row">
              <div class="label">手机号</div>
              <div class="copy-tip">点击复制</div>
            </div>
            <div class="value mono copy-panel" id="accountPhonePanel" data-copy-target="accountPhone" data-copy-label="手机号" title="点击复制手机号">
              <span id="accountPhone">-</span>
            </div>
            <div class="label-row" style="margin-top: 18px;">
              <div class="label">手机号验证码</div>
              <div class="copy-tip">点击复制</div>
            </div>
            <div class="value mono copy-panel" id="accountPhoneCodePanel" data-copy-target="accountPhoneCode" data-copy-label="手机号验证码" title="点击复制手机号验证码">
              <span id="accountPhoneCode">-</span>
            </div>
          </div>
        </section>
      </section>

      <section id="panel-sms" class="tab-panel card" hidden>
        <h2>接码兑换</h2>
        <p class="muted">输入 `SMS-` 开头的 CDK，自动分配手机号并查看验证码取件地址。接码兑换 和 Plus兑换 不通用。</p>

        <div class="sms-actions">
          <input id="smsCdk" placeholder="请输入接码兑换 CDK，例如 SMS-ABC123XYZ9" />
          <button class="tertiary" id="smsRedeemBtn">兑换 SMS</button>
        </div>

        <div class="status" id="smsStatus"></div>

        <section class="panel-grid">
          <div class="panel">
            <div class="label">手机号</div>
            <div class="value mono" id="smsPhone">-</div>
          </div>
        </section>

        <section class="sms-box" style="margin-top: 16px;">
          <div class="label">网页取件地址</div>
          <div class="value"><a id="smsPickupUrl" class="link mono" href="#" target="_blank">-</a></div>
        </section>

        <section class="sms-box" style="margin-top: 16px;">
          <div class="label">最近验证码</div>
          <div class="value mono" id="smsCode">-</div>
        </section>
      </section>
    </main>

    <script>
      const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));
      const tabPanels = {
        mail: document.getElementById("panel-mail"),
        sms: document.getElementById("panel-sms"),
      };
      const ACTIVE_TAB_KEY = "cdk_duihuan_home_active_tab";

      function switchTab(tab) {
        tabButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.tab === tab);
        });
        Object.entries(tabPanels).forEach(([key, panel]) => {
          panel.hidden = key !== tab;
        });
        localStorage.setItem(ACTIVE_TAB_KEY, tab);
      }

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => switchTab(button.dataset.tab));
      });

      const cdkInput = document.getElementById("cdk");
      const statusEl = document.getElementById("status");
      const plusResultPanelsEl = document.getElementById("plusResultPanels");
      const accountPhoneCardEl = document.getElementById("accountPhoneCard");
      const emailEl = document.getElementById("email");
      const accountPhoneEl = document.getElementById("accountPhone");
      const accountPhoneCodeEl = document.getElementById("accountPhoneCode");
      const mailStatusEl = document.getElementById("mailStatus");
      const mailListEl = document.getElementById("mailList");

      const smsCdkInput = document.getElementById("smsCdk");
      const smsStatusEl = document.getElementById("smsStatus");
      const smsPhoneEl = document.getElementById("smsPhone");
      const smsPickupUrlEl = document.getElementById("smsPickupUrl");
      const smsCodeEl = document.getElementById("smsCode");
      let mailPollingTimer = null;
      let mailCountdownTimer = null;
      let mailCountdown = 15;
      let smsPollingTimer = null;
      let smsToken = "";

      function setStatus(message, isError = false) {
        if (!message) {
          statusEl.hidden = true;
          statusEl.textContent = "";
          return;
        }
        statusEl.hidden = false;
        statusEl.textContent = message;
        statusEl.style.color = isError ? "#b42318" : "#a64b2a";
      }

      function setSmsStatus(message, isError = false) {
        smsStatusEl.textContent = isError ? message : "";
        smsStatusEl.style.color = isError ? "#b42318" : "#145b9f";
      }

      function formatPhoneDisplay(value) {
        const phone = String(value || "").trim();
        if (!phone || phone === "-") {
          return "-";
        }
        return phone.startsWith("+") ? phone : `+${phone}`;
      }

      async function copyText(value) {
        try {
          await navigator.clipboard.writeText(value);
          return true;
        } catch (error) {
          const textarea = document.createElement("textarea");
          textarea.value = value;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          textarea.setSelectionRange(0, textarea.value.length);
          let ok = false;
          try {
            ok = document.execCommand("copy");
          } catch (execError) {
            ok = false;
          }
          document.body.removeChild(textarea);
          return ok;
        }
      }

      function resetPageState() {
        cdkInput.value = "";
        setStatus("");
        plusResultPanelsEl.hidden = true;
        accountPhoneCardEl.hidden = true;
        emailEl.textContent = "-";
        accountPhoneEl.textContent = "-";
        accountPhoneCodeEl.textContent = "-";
        mailStatusEl.textContent = "";
        mailCountdown = 15;
        mailListEl.innerHTML = '<div class="mail-empty">暂无验证码</div>';

        smsCdkInput.value = "";
        setSmsStatus("");
        smsPhoneEl.textContent = "-";
        smsPickupUrlEl.textContent = "-";
        smsPickupUrlEl.href = "#";
        smsCodeEl.textContent = "-";
        smsToken = "";
        const activeTab = localStorage.getItem(ACTIVE_TAB_KEY);
        switchTab(tabPanels[activeTab] ? activeTab : "mail");
        if (smsPollingTimer) {
          clearInterval(smsPollingTimer);
          smsPollingTimer = null;
        }
      }

      async function copyPanelValue(panel) {
        const targetId = panel.dataset.copyTarget;
        const label = panel.dataset.copyLabel || "内容";
        const targetEl = document.getElementById(targetId);
        const value = (targetEl?.textContent || "").trim();
        const tipEl = panel.querySelector(".copy-tip");
        if (!value || value === "-") {
          if (tipEl) { tipEl.textContent = "请先兑换"; tipEl.style.color = "var(--error)"; }
          setTimeout(() => {
            if (tipEl) { tipEl.textContent = "点击复制"; tipEl.style.color = ""; }
          }, 1200);
          return;
        }
        try {
          const ok = await copyText(value);
          if (!ok) throw new Error("copy failed");
          panel.classList.add("copied");
          if (tipEl) { tipEl.textContent = "✓ 已复制"; tipEl.style.color = "var(--success)"; }
          setTimeout(() => {
            panel.classList.remove("copied");
            if (tipEl) { tipEl.textContent = "点击复制"; tipEl.style.color = ""; }
          }, 1200);
        } catch (error) {
          if (tipEl) { tipEl.textContent = "复制失败"; tipEl.style.color = "var(--error)"; }
          setTimeout(() => {
            if (tipEl) { tipEl.textContent = "点击复制"; tipEl.style.color = ""; }
          }, 1200);
        }
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatDisplayTime(value) {
        if (!value) {
          return "-";
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return new Intl.DateTimeFormat("zh-CN", {
          timeZone: "Asia/Shanghai",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        }).format(date);
      }

      function renderMailList(items) {
        if (!items || items.length === 0) {
          mailListEl.innerHTML = '<div class="mail-empty">暂无验证码</div>';
          return;
        }

        const firstItem = items[0] || {};
        const hasCode = firstItem.code && firstItem.code.trim();
        if (!hasCode) {
          mailListEl.innerHTML = '<div class="mail-empty">暂无验证码</div>';
          return;
        }

        mailListEl.innerHTML = items.slice(0, 1).map((item) => {
          const hasCode = item.code && item.code.trim();
          const codeHtml = hasCode
            ? `<span class="code-copyable" data-code="${escapeHtml(item.code)}">${
                escapeHtml(item.code)
              }<span class="code-copy-hint">点击复制</span></span>`
            : `<span style="font-size:16px;font-weight:500;opacity:0.5">未识别到</span>`;
          return `
          <div class="mail-item-code">验证码: ${codeHtml}</div>`;
        }).join("");

        mailListEl.querySelectorAll(".code-copyable").forEach((el) => {
          el.addEventListener("click", async () => {
            const code = el.dataset.code || "";
            if (!code) return;
            const hint = el.querySelector(".code-copy-hint");
            try {
              await copyText(code);
              setStatus(`已复制验证码：${code}`);
              if (hint) { hint.textContent = "✓ 已复制"; hint.classList.add("copied"); }
            } catch (e) {
              setStatus("复制失败", true);
            }
            setTimeout(() => {
              if (hint) { hint.textContent = "点击复制"; hint.classList.remove("copied"); }
            }, 1500);
          });
        });
      }

      async function fetchJson(url, options = {}) {
        const response = await fetch(url, options);
        const text = await response.text();
        let data;
        try {
          data = text ? JSON.parse(text) : {};
        } catch (error) {
          throw new Error(`接口返回了非 JSON 内容: ${text.slice(0, 120)}`);
        }
        if (!response.ok) {
          throw new Error(data.error || "请求失败");
        }
        return data;
      }

      async function lookupAccount() {
        const cdk = cdkInput.value.trim();
        if (!cdk) {
          setStatus("请输入 CDK", true);
          return;
        }

        setStatus("正在兑换...");
        try {
          // 第一步：纯 DB 查询，极快（<100ms），立即展示账号信息
          const data = await fetchJson("/api/account", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cdk }),
          });

          plusResultPanelsEl.hidden = false;
          emailEl.textContent = data.email || "-";
          accountPhoneCardEl.hidden = !data.phone;
          accountPhoneEl.textContent = formatPhoneDisplay(data.phone);
          accountPhoneCodeEl.textContent = "暂无验证码";
          if (data.phone) {
            try {
              const smsData = await fetchJson(`/api/sms/code/${encodeURIComponent(data.phone)}`);
              accountPhoneCodeEl.textContent = smsData.code || "暂无验证码";
            } catch (error) {
              accountPhoneCodeEl.textContent = "暂无验证码";
            }
          }
          setStatus(`兑换成功：${data.cdk}`);
          // 第二步：邮件请求并行发出，不阻塞账号展示
          startMailPolling();
          loadAllCodes();
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function loadAllCodes() {
        const cdk = cdkInput.value.trim();
        if (!cdk) {
          setStatus("请输入 CDK", true);
          return;
        }

        try {
          const data = await fetchJson("/api/all-mails", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cdk }),
          });
          renderMailList(data.items || []);
          mailCountdown = 15;
          mailStatusEl.textContent = `自动刷新倒计时 ${mailCountdown} 秒`;
        } catch (error) {
          mailStatusEl.textContent = error.message;
        }
      }

      async function refreshMailListSilently() {
        const cdk = cdkInput.value.trim();
        if (!cdk || document.hidden) {
          return;
        }
        try {
          const data = await fetchJson("/api/all-mails", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cdk }),
          });
          renderMailList(data.items || []);
          mailCountdown = 15;
          mailStatusEl.textContent = `自动刷新倒计时 ${mailCountdown} 秒`;
        } catch (error) {
          mailStatusEl.textContent = error.message;
        }
      }

      function startMailPolling() {
        if (mailPollingTimer) {
          clearInterval(mailPollingTimer);
        }
        if (mailCountdownTimer) {
          clearInterval(mailCountdownTimer);
        }
        mailCountdownTimer = setInterval(() => {
          if (document.hidden) {
            return;
          }
          mailCountdown = mailCountdown <= 1 ? 15 : mailCountdown - 1;
          mailStatusEl.textContent = `自动刷新倒计时 ${mailCountdown} 秒`;
        }, 1000);
        mailPollingTimer = setInterval(() => {
          if (!document.hidden) {
            refreshMailListSilently();
          }
        }, 15000);
      }

      async function refreshSmsCode() {
        if (!smsToken) {
          return;
        }
        try {
          const data = await fetchJson(`/api/sms/code/${encodeURIComponent(smsToken)}`);
          smsCodeEl.textContent = data.code || "等待中";
        } catch (error) {
          setSmsStatus(error.message, true);
        }
      }

      async function redeemSms() {
        const cdk = smsCdkInput.value.trim();
        if (!cdk) {
          setSmsStatus("请输入接码兑换 CDK", true);
          return;
        }

          setSmsStatus("");
        try {
          const data = await fetchJson("/api/sms/redeem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cdk }),
          });

          smsPhoneEl.textContent = formatPhoneDisplay(data.phone);
          smsPickupUrlEl.textContent = data.pickupUrl || "-";
          smsPickupUrlEl.href = data.pickupUrl || "#";
          smsToken = data.pickupToken || "";
          setSmsStatus("");
          await refreshSmsCode();
          if (smsPollingTimer) {
            clearInterval(smsPollingTimer);
          }
          smsPollingTimer = setInterval(refreshSmsCode, 5000);
          switchTab("sms");
        } catch (error) {
          setSmsStatus(error.message, true);
        }
      }

      document.getElementById("lookupBtn").addEventListener("click", lookupAccount);
      document.getElementById("codeBtn").addEventListener("click", loadAllCodes);
      document.getElementById("smsRedeemBtn").addEventListener("click", redeemSms);
      document.querySelectorAll(".copy-panel").forEach((panel) => {
        panel.addEventListener("click", () => copyPanelValue(panel));
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          refreshMailListSilently();
        }
      });
      resetPageState();
      startMailPolling();
    </script>
  </body>
  </html>
