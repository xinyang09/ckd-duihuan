<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDK 兑换中心</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: rgba(255, 250, 242, 0.9);
        --line: #d9c7a8;
        --text: #2d2418;
        --muted: #6c5d47;
        --accent: #a64b2a;
        --accent-2: #1f5c4a;
        --accent-3: #145b9f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
        background:
          radial-gradient(circle at top left, #f9d8b8 0, transparent 28%),
          linear-gradient(135deg, #f4efe6, #efe5d3 45%, #e8dcc7);
        color: var(--text);
        min-height: 100vh;
        padding: 24px;
      }
      .page {
        width: min(920px, 100%);
        margin: 0 auto;
      }
      .hero {
        margin-bottom: 20px;
      }
      .hero h1 {
        margin: 0 0 8px;
        font-size: 34px;
      }
      .hero p {
        margin: 0;
        color: var(--muted);
      }
      .tabs {
        display: flex;
        gap: 12px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }
      .tab-btn {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 15px;
        cursor: pointer;
        background: rgba(255,255,255,0.72);
        color: var(--text);
      }
      .tab-btn.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .tab-btn[data-tab="sms"].active {
        background: var(--accent-3);
        border-color: var(--accent-3);
      }
      .card {
        background: var(--panel);
        border: 1px solid rgba(217, 199, 168, 0.9);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 24px 80px rgba(77, 52, 21, 0.14);
        backdrop-filter: blur(12px);
      }
      .tab-panel[hidden] {
        display: none;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      .muted {
        color: var(--muted);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 12px;
        margin: 18px 0 14px;
      }
      input, textarea {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid var(--line);
        font-size: 16px;
        background: #fffdf9;
        color: var(--text);
      }
      button {
        border: 0;
        border-radius: 14px;
        padding: 0 18px;
        font-size: 15px;
        cursor: pointer;
        color: white;
        transition: transform .16s ease, opacity .16s ease;
      }
      button:hover { transform: translateY(-1px); }
      .primary { background: var(--accent); }
      .secondary { background: var(--accent-2); }
      .tertiary { background: var(--accent-3); }
      .status {
        min-height: 24px;
        margin-bottom: 14px;
        color: var(--accent);
      }
      .panel-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 16px;
      }
      .panel {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255,255,255,0.58);
      }
      .copy-panel {
        cursor: pointer;
        transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
      }
      .copy-panel:hover {
        transform: translateY(-1px);
        border-color: #c89f78;
        box-shadow: 0 14px 28px rgba(77, 52, 21, 0.08);
        background: rgba(255,255,255,0.78);
      }
      .copy-panel.copied {
        border-color: #1f5c4a;
        box-shadow: 0 0 0 3px rgba(31, 92, 74, 0.12);
      }
      .label {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }
      .copy-tip {
        font-size: 12px;
        color: var(--accent-3);
      }
      .value {
        font-size: 18px;
        word-break: break-all;
      }
      .mail, .sms-box {
        padding: 18px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid var(--line);
      }
      .mail-list {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }
      .mail-item {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.75);
        padding: 14px 16px;
      }
      .mail-item-title {
        font-size: 16px;
        line-height: 1.45;
        margin-bottom: 8px;
      }
      .mail-item-meta {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
      }
      .mail-item-code {
        margin-top: 10px;
        font-size: 18px;
        font-weight: 700;
        color: var(--accent-2);
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .link {
        color: var(--accent-3);
        word-break: break-all;
      }
      .sms-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        margin: 18px 0 14px;
      }
      @media (max-width: 720px) {
        .row, .sms-actions, .panel-grid { grid-template-columns: 1fr; }
        button { height: 48px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>CDK 兑换中心</h1>
        <p>邮箱账号兑换和 SMS 接码兑换共用当前项目数据库，但两类 CDK 分开管理，不通用。</p>
      </section>

      <section class="tabs">
        <button class="tab-btn active" data-tab="mail" type="button">邮箱 CDK</button>
        <button class="tab-btn" data-tab="sms" type="button">SMS CDK</button>
      </section>

      <section id="panel-mail" class="tab-panel card">
        <h2>邮箱 CDK</h2>
        <p class="muted">输入 GPT 开头的邮箱账号 CDK，获取账号信息和最近验证码邮件。</p>

        <div class="row">
          <input id="cdk" placeholder="请输入 GPT CDK" />
          <button class="primary" id="lookupBtn">兑换</button>
          <button class="secondary" id="codeBtn">获取邮件列表</button>
        </div>

        <div class="status" id="status"></div>

        <section class="panel-grid">
          <div class="panel copy-panel" id="emailPanel" data-copy-target="email" data-copy-label="邮箱" title="点击复制邮箱">
            <div class="label-row">
              <div class="label">邮箱</div>
              <div class="copy-tip">点击复制</div>
            </div>
            <div class="value" id="email">-</div>
          </div>
          <div class="panel copy-panel" id="passwordPanel" data-copy-target="gptPassword" data-copy-label="GPT 密码" title="点击复制 GPT 密码">
            <div class="label-row">
              <div class="label">GPT 密码</div>
              <div class="copy-tip">点击复制</div>
            </div>
            <div class="value" id="gptPassword">-</div>
          </div>
        </section>

        <section class="mail">
          <div class="label">最新验证码邮件</div>
          <div id="latestMailCard" class="mail-list">
            <div class="mail-item">暂无内容</div>
          </div>
        </section>

        <section class="mail" style="margin-top: 16px;">
          <div class="label">验证码邮件列表</div>
          <div class="value" id="mailListMeta">-</div>
          <div id="mailList" class="mail-list">
            <div class="mail-item">暂无内容</div>
          </div>
        </section>
      </section>

      <section id="panel-sms" class="tab-panel card" hidden>
        <h2>SMS CDK</h2>
        <p class="muted">输入 `SMS-` 开头的 CDK，自动分配手机号并查看验证码取件地址。SMS CDK 和邮箱 CDK 不通用。</p>

        <div class="sms-actions">
          <input id="smsCdk" placeholder="请输入 SMS CDK，例如 SMS-ABC123XYZ9" />
          <button class="tertiary" id="smsRedeemBtn">兑换 SMS</button>
        </div>

        <div class="status" id="smsStatus"></div>

        <section class="panel-grid">
          <div class="panel">
            <div class="label">手机号</div>
            <div class="value mono" id="smsPhone">-</div>
          </div>
        </section>

        <section class="sms-box">
          <div class="label">API 取件地址</div>
          <div class="value"><a id="smsApiUrl" class="link mono" href="#" target="_blank">-</a></div>
        </section>

        <section class="sms-box" style="margin-top: 16px;">
          <div class="label">网页取件地址</div>
          <div class="value"><a id="smsPickupUrl" class="link mono" href="#" target="_blank">-</a></div>
        </section>

        <section class="sms-box" style="margin-top: 16px;">
          <div class="label">最近验证码</div>
          <div class="value mono" id="smsCode">-</div>
          <div class="label" style="margin-top: 12px;">原始短信</div>
          <div class="value mono" id="smsRaw" style="font-size: 14px; white-space: pre-wrap;">暂无内容</div>
        </section>
      </section>
    </main>

    <script>
      const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));
      const tabPanels = {
        mail: document.getElementById("panel-mail"),
        sms: document.getElementById("panel-sms"),
      };

      function switchTab(tab) {
        tabButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.tab === tab);
        });
        Object.entries(tabPanels).forEach(([key, panel]) => {
          panel.hidden = key !== tab;
        });
      }

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => switchTab(button.dataset.tab));
      });

      const cdkInput = document.getElementById("cdk");
      const statusEl = document.getElementById("status");
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("gptPassword");
      const latestMailCardEl = document.getElementById("latestMailCard");
      const mailListMetaEl = document.getElementById("mailListMeta");
      const mailListEl = document.getElementById("mailList");

      const smsCdkInput = document.getElementById("smsCdk");
      const smsStatusEl = document.getElementById("smsStatus");
      const smsPhoneEl = document.getElementById("smsPhone");
      const smsApiUrlEl = document.getElementById("smsApiUrl");
      const smsPickupUrlEl = document.getElementById("smsPickupUrl");
      const smsCodeEl = document.getElementById("smsCode");
      const smsRawEl = document.getElementById("smsRaw");
      let smsPollingTimer = null;
      let smsToken = "";

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? "#b42318" : "#a64b2a";
      }

      function setSmsStatus(message, isError = false) {
        smsStatusEl.textContent = message;
        smsStatusEl.style.color = isError ? "#b42318" : "#145b9f";
      }

      async function copyPanelValue(panel) {
        const targetId = panel.dataset.copyTarget;
        const label = panel.dataset.copyLabel || "内容";
        const targetEl = document.getElementById(targetId);
        const value = (targetEl?.textContent || "").trim();
        if (!value || value === "-") {
          setStatus(`${label}为空，无法复制`, true);
          return;
        }
        try {
          await navigator.clipboard.writeText(value);
          panel.classList.add("copied");
          setStatus(`已复制${label}`);
          window.setTimeout(() => panel.classList.remove("copied"), 1200);
        } catch (error) {
          setStatus(`复制${label}失败`, true);
        }
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderMailList(items) {
        if (!items || items.length === 0) {
          mailListEl.innerHTML = '<div class="mail-item">暂无匹配的验证码邮件</div>';
          return;
        }

        mailListEl.innerHTML = items.map((item, index) => `
          <article class="mail-item">
            <div class="mail-item-title">${index + 1}. [${escapeHtml(item.mailbox)}] ${escapeHtml(item.subject)}</div>
            <div class="mail-item-meta">From: ${escapeHtml(item.from)}</div>
            <div class="mail-item-meta">Date: ${escapeHtml(item.date)}</div>
            <div class="mail-item-code">验证码: ${escapeHtml(item.code || "未识别到")}</div>
          </article>
        `).join("");
      }

      function renderLatestMail(item) {
        if (!item) {
          latestMailCardEl.innerHTML = '<div class="mail-item">暂无内容</div>';
          return;
        }

        latestMailCardEl.innerHTML = `
          <article class="mail-item">
            <div class="mail-item-title">[${escapeHtml(item.mailbox)}] ${escapeHtml(item.subject)}</div>
            <div class="mail-item-meta">From: ${escapeHtml(item.from)}</div>
            <div class="mail-item-meta">Date: ${escapeHtml(item.date)}</div>
            <div class="mail-item-code">验证码: ${escapeHtml(item.code || "未识别到")}</div>
          </article>
        `;
      }

      async function fetchJson(url, options = {}) {
        const response = await fetch(url, options);
        const text = await response.text();
        let data;
        try {
          data = text ? JSON.parse(text) : {};
        } catch (error) {
          throw new Error(`接口返回了非 JSON 内容: ${text.slice(0, 120)}`);
        }
        if (!response.ok) {
          throw new Error(data.error || "请求失败");
        }
        return data;
      }

      async function lookupAccount() {
        const cdk = cdkInput.value.trim();
        if (!cdk) {
          setStatus("请输入 CDK", true);
          return;
        }

        setStatus("正在兑换...");
        try {
          const data = await fetchJson("/api/account", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cdk }),
          });

          emailEl.textContent = data.email || "-";
          passwordEl.textContent = data.gpt_password || "-";
          setStatus(`兑换成功：${data.cdk}`);
          await loadLatestCode();
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function loadLatestCode() {
        const cdk = cdkInput.value.trim();
        if (!cdk) {
          setStatus("请输入 CDK", true);
          return;
        }

        setStatus("正在获取验证码邮件...");
        try {
          const data = await fetchJson("/api/latest-code", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cdk }),
          });
          renderLatestMail(data);
          setStatus("最新验证码邮件已更新");
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function loadAllCodes() {
        const cdk = cdkInput.value.trim();
        if (!cdk) {
          setStatus("请输入 CDK", true);
          return;
        }

        setStatus("正在获取邮件列表...");
        try {
          const data = await fetchJson("/api/all-mails", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cdk }),
          });
          mailListMetaEl.textContent = `共 ${data.count || 0} 封验证码邮件`;
          renderMailList(data.items || []);
          setStatus("邮件列表已更新");
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function refreshSmsCode() {
        if (!smsToken) {
          return;
        }
        try {
          const data = await fetchJson(`/api/sms/code/${encodeURIComponent(smsToken)}`);
          smsCodeEl.textContent = data.code || "等待中";
          smsRawEl.textContent = data.raw || "暂无内容";
        } catch (error) {
          setSmsStatus(error.message, true);
        }
      }

      async function redeemSms() {
        const cdk = smsCdkInput.value.trim();
        if (!cdk) {
          setSmsStatus("请输入 SMS CDK", true);
          return;
        }

        setSmsStatus("正在兑换 SMS...");
        try {
          const data = await fetchJson("/api/sms/redeem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cdk }),
          });

          smsPhoneEl.textContent = data.phone || "-";
          smsApiUrlEl.textContent = data.apiUrl || "-";
          smsApiUrlEl.href = data.apiUrl || "#";
          smsPickupUrlEl.textContent = data.pickupUrl || "-";
          smsPickupUrlEl.href = data.pickupUrl || "#";
          smsToken = data.pickupToken || "";
          setSmsStatus(data.mode === "existing" ? "这个 SMS CDK 已兑换过，已返回原手机号" : "SMS CDK 兑换成功");
          await refreshSmsCode();
          if (smsPollingTimer) {
            clearInterval(smsPollingTimer);
          }
          smsPollingTimer = setInterval(refreshSmsCode, 12000);
          switchTab("sms");
        } catch (error) {
          setSmsStatus(error.message, true);
        }
      }

      document.getElementById("lookupBtn").addEventListener("click", lookupAccount);
      document.getElementById("codeBtn").addEventListener("click", loadAllCodes);
      document.getElementById("smsRedeemBtn").addEventListener("click", redeemSms);
      document.querySelectorAll(".copy-panel").forEach((panel) => {
        panel.addEventListener("click", () => copyPanelValue(panel));
      });
    </script>
  </body>
  </html>
