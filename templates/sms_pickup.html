<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMS 取件页</title>
  </head>
  <body>
    <pre id="sms-output"></pre>
    <script>
      const endpoint = {{ ("/sms-pickup/raw?phone=" ~ phone if phone else "/sms-pickup/raw?code=" ~ code)|tojson }};

      async function refreshSmsPickup() {
        try {
          const response = await fetch(endpoint, { cache: "no-store" });
          const text = await response.text();
          document.getElementById("sms-output").textContent = text;
        } catch (error) {
          document.getElementById("sms-output").textContent = "";
        }
      }

      refreshSmsPickup();
      setInterval(refreshSmsPickup, 5000);
    </script>
  </body>
  </html>
